{% extends 'base.html' %}

{% block title %}Usuń notatkę{% endblock %}

{% block content %}
    <h1>Usuń notatkę</h1>
    
    <p>Czy na pewno chcesz usunąć notatkę:</p>
    <h3 style="color: #e74c3c;">"{{ note.title }}"</h3>
    
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <button type="submit" 
                style="background-color: #e74c3c; color: white; padding: 12px 25px; 
                       border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
            Tak, usuń notatkę
        </button>
    </form>
    
    <br>
    <a href="{% url 'note_list' %}" style="color: #3498db; text-decoration: none;">
        ← Nie, anuluj i wróć do listy
    </a>
{% endblock %}
