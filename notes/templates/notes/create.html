{% extends 'base.html' %}

{% block title %}Nowa notatka{% endblock %}

{% block content %}
    <h1>Nowa notatka</h1>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <br>
        <button type="submit" style="padding: 10px 20px; font-size: 16px;">
            Zapisz notatkę
        </button>
    </form>

    <br>
    <a href="{% url 'note_list' %}">← Powrót do listy</a>
{% endblock %}
